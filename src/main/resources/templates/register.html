<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - RideShare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container-narrow">
    <div class="card">
        <h1>Create your account</h1>
        <p class="muted">Sign up as a rider to book trips, or as a driver to earn.</p>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" id="registerForm">
            <div class="form-group">
                <label>I am a</label>
                <select name="role" id="roleSelect" onchange="toggleDriverFields()">
                    <option value="RIDER">Rider (book rides)</option>
                    <option value="DRIVER">Driver (give rides)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="Jane Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" required placeholder="9876543210">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Choose a password">
            </div>

            <div id="driverFields" style="display:none;">
                <div class="form-group">
                    <label>Vehicle Type</label>
                    <select name="vehicleType">
                        <option th:each="vt : ${vehicleTypes}" th:value="${vt}" th:text="${vt}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Vehicle Number</label>
                    <input type="text" name="vehicleNumber" placeholder="MH12AB1234">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <p class="muted" style="margin-top:16px; text-align:center;">
            Already have an account? <a th:href="@{/login}">Log in</a>
        </p>
    </div>
</div>

<script>
    function toggleDriverFields() {
        const role = document.getElementById('roleSelect').value;
        document.getElementById('driverFields').style.display = (role === 'DRIVER') ? 'block' : 'none';
    }
</script>
</body>
</html>

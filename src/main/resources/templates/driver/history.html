<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Trips - RideShare Driver</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <a class="brand" th:href="@{/driver/dashboard}">🚗 Ride<span>Share</span> <span style="color:#94a3b8;font-weight:400;">Driver</span></a>
    <nav>
        <a th:href="@{/driver/dashboard}">Dashboard</a>
        <a th:href="@{/logout}">Logout</a>
    </nav>
</div>

<div class="container">
    <div class="card">
        <h1>My Trips</h1>

        <div th:if="${#lists.isEmpty(rides)}" class="empty-state">
            No trips yet. Go online from the dashboard to start receiving requests.
        </div>

        <table th:unless="${#lists.isEmpty(rides)}">
            <thead>
            <tr><th>ID</th><th>Date</th><th>Rider</th><th>Status</th><th>Fare</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="ride : ${rides}">
                <td th:text="'#' + ${ride.id}"></td>
                <td th:text="${#temporals.format(ride.requestedAt, 'dd MMM, hh:mm a')}"></td>
                <td th:text="${ride.riderName}"></td>
                <td><span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(ride.status)}" th:text="${ride.status}"></span></td>
                <td th:text="${ride.fare != null} ? '₹ ' + ${ride.fare} : '—'"></td>
                <td><a th:href="@{'/driver/ride/' + ${ride.id}}" class="btn btn-sm btn-outline">View</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>

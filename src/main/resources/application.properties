# ===================== SERVER =====================
server.port=8181

# ===================== MYSQL DATASOURCE =====================
# Update username/password to match your local MySQL setup.
# Database "rideshare_db" will be auto-created if it doesn't exist.
spring.datasource.url=jdbc:mysql://localhost:3306/rideshare_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=ritik
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===================== LOGGING =====================
logging.level.org.springframework.web=INFO
logging.level.com.rideshare=DEBUG
